# Deliberately quantum-vulnerable config fixture for the config-file scanner.
# PQC002: ecdsa host key algorithm.
HostKeyAlgorithms ecdsa-sha2-nistp256,ssh-rsa

# PQC001: RSA key size reference.
HostKey /etc/ssh/ssh_host_rsa_2048_key

# PQC004: Diffie-Hellman key exchange.
KexAlgorithms diffie-hellman-group14-sha256
