# gitleaks configuration for pqc-migrator
# Keeps ALL default detectors active. Allowlists documentation example output:
# PQC key-exchange group identifiers (e.g. X25519MLKEM768) and TLS cipher-suite
# names are high-entropy *identifiers*, not credentials. They appear in README
# sample output and trip the entropy-based generic-api-key rule as false positives.
title = "pqc-migrator gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Doc example output: PQC group + TLS cipher identifiers (not secrets)"
regexes = [
  '''X25519MLKEM768''',
  '''SecP256r1MLKEM768''',
  '''TLS_AES_256_GCM_SHA384''',
  '''TLS_CHACHA20_POLY1305_SHA256''',
]
