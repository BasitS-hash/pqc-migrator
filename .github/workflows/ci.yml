name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest with coverage
        run: pytest --cov=pqc_migrator --cov-report=term-missing --cov-report=xml
      - name: Smoke-test the CLI end to end
        run: |
          pqc-migrator --version
          pqc-migrator scan tests/fixtures --json --no-fail-on-findings > /dev/null
          pqc-migrator cbom tests/fixtures --format json > /dev/null
          pqc-migrator scan tests/fixtures --sarif --no-fail-on-findings > pqc.sarif
          python -c "import json; json.load(open('pqc.sarif'))"
